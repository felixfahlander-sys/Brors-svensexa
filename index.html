<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BCP">
  <title>Bachelor Control Panel</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="assets/app.css">
</head>
<body>

  <!-- ═══════════════════════════ HEADER ═══════════════════════════ -->
  <header id="header">
    <div id="header-inner">
      <span id="app-title">🎩 Pontus Sexa</span>
      <div id="header-right">
        <span id="rigged-badge" hidden aria-label="Riggning är aktiv">🎛️ Riggad</span>
        <button id="btn-settings" aria-label="Inställningar">⚙️</button>
      </div>
    </div>
    <!-- Hidden rigging panel, revealed by long-press on header title -->
    <div id="rig-panel" hidden role="region" aria-label="Rigging controls">
      <div id="rig-inner">
        <h3>🎛️ Rigging Panel <span style="font-size:.75rem;opacity:.5">(shhh)</span></h3>
        <p class="rig-hint">Tweak who gets picked. Subtle but noticeable.</p>
        <div id="rig-weights"></div>
        <label class="toggle-row">
          <input type="checkbox" id="rig-enabled">
          <span class="toggle-label">Enable Rigged Mode</span>
        </label>
        <button id="btn-rig-close" class="btn-sm btn-secondary" style="margin-top:.75rem">✕ Close</button>
      </div>
    </div>
  </header>

  <!-- ═══════════════════════════ MAIN ═══════════════════════════ -->
  <main id="main" role="main">

    <!-- TAB: Who Pays? -->
    <section id="tab-pays" class="tab-panel active" aria-label="Vem betalar">
      <h2>💳 Vem betalar?</h2>
      <div id="pays-result" class="result-box" aria-live="polite" aria-atomic="true">
        <span class="result-placeholder">Tryck på knappen!</span>
      </div>
      <div id="pays-reason" class="result-reason"></div>
      <div class="btn-group">
        <button id="btn-pays-pick" class="btn-primary btn-xl">🎲 Välj!</button>
        <button id="btn-pays-reroll" class="btn-secondary" disabled aria-label="Rulla igen">🔄 Rulla igen</button>
        <button id="btn-pays-exclude" class="btn-secondary" disabled aria-label="Uteslut den här personen">🚫 Uteslut</button>
      </div>
      <div id="pays-excluded" class="excluded-list" aria-label="Uteslutna spelare" aria-live="polite"></div>
      <button id="btn-pays-reset" class="btn-danger btn-sm pays-reset-btn" hidden aria-label="Återställ omgången">🔁 Återställ omgången</button>
    </section>

    <!-- TAB: Enarmad Bandit -->
    <section id="tab-wheel" class="tab-panel" aria-label="Enarmad Bandit" hidden>
      <h2>🎰 Enarmad Bandit</h2>
      <div id="slot-machine">
        <div id="slot-window" aria-label="Slotmaskin">
          <div id="slot-track"></div>
          <div class="slot-lines" aria-hidden="true"></div>
        </div>
      </div>
      <div id="wheel-result" class="result-box" aria-live="polite" aria-atomic="true">
        <span class="result-placeholder">Snurra hjulet!</span>
      </div>
      <div class="btn-group">
        <button id="btn-wheel-spin" class="btn-primary btn-xl">🎰 Snurra!</button>
      </div>
    </section>



    <!-- TAB: Ska vi? -->
    <section id="tab-decision" class="tab-panel" aria-label="Ska vi göra det här" hidden>
      <h2>🤔 Ska vi?</h2>
      <div id="decision-result" class="result-box decision-result-box" aria-live="polite" aria-atomic="true">
        <span class="result-placeholder">Fråga oraklet…</span>
      </div>
      <div class="btn-group">
        <button id="btn-decision-roll" class="btn-primary btn-xl">🎲 Avgör!</button>
      </div>
    </section>

    <!-- TAB: Inställningar -->
    <section id="tab-settings" class="tab-panel" aria-label="Inställningar" hidden>
      <h2>⚙️ Inställningar</h2>
      <div id="settings-content" class="settings-list"></div>
    </section>

  </main>

  <!-- ═══════════════════════════ BOTTOM NAV ═══════════════════════════ -->
  <nav id="bottom-nav" role="navigation" aria-label="Main navigation">
    <button class="nav-btn active" data-tab="pays" aria-label="Vem betalar" aria-current="page">
      <span class="nav-icon">💳</span>
      <span class="nav-label">Betalar</span>
    </button>
    <button class="nav-btn" data-tab="wheel" aria-label="Enarmad Bandit">
      <span class="nav-icon">🎰</span>
      <span class="nav-label">Bandit</span>
    </button>
    <button class="nav-btn" data-tab="decision" aria-label="Ska vi göra det här">
      <span class="nav-icon">🤔</span>
      <span class="nav-label">Ska vi?</span>
    </button>
  </nav>

  <!-- ═══════════════════════════ OVERLAYS ═══════════════════════════ -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>
  <div id="confetti-container" aria-hidden="true"></div>

  <script src="assets/app.js"></script>
</body>
</html>
